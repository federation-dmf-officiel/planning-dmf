<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test DMF</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>#map { height: 90vh; width: 100%; } body { margin: 0; padding: 10px; font-family: sans-serif; }</style>
</head>
<body>
    <div id="info">Statut : Chargement des données...</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([46.6, 2.3], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        fetch("https://sheetdb.io/api/v1/2kdvt8m5dti9s")
        .then(res => res.json())
        .then(data => {
            const info = document.getElementById('info');
            if (data.length === 0) {
                info.innerHTML = "⚠️ AUCUNE DONNÉE TROUVÉE. Le tableau Google Sheets semble vide pour l'API.";
            } else {
                info.innerHTML = "✅ " + data.length + " rendez-vous trouvés. Analyse des villes...";
                data.forEach(item => {
                    const ville = item.ville || item.Ville;
                    if(ville) {
                        fetch(`https://nominatim.openstreetmap.org/search?q=${ville}&format=json&limit=1`)
                        .then(r => r.json())
                        .then(g => {
                            if(g.length > 0) {
                                L.marker([g[0].lat, g[0].lon]).addTo(map).bindPopup(item.titre || item.Titre);
                            }
                        });
                    }
                });
            }
        })
        .catch(err => {
            document.getElementById('info').innerHTML = "❌ ERREUR API : Vérifiez votre lien SheetDB.";
        });
    </script>
</body>
</html>
